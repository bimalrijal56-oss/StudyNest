            <li class="nav-item">
              <a class="nav-link text-light py-2 fs-1" aria-current="page" href="./index.html">Home</a>

  <!-- start of main -->
  <main>
    <div class="container my-5" id="login">
      <div class="d-md-flex justify-content-evenly p-3 border rounded-4">
        <div class="col-md-5">
          <form action="" class="p-2">
            <h3>Login to your account</h3>
            <hr>

            <div class="form-group mb-3">
              <label for="fname" class="fw-bold fs-4">Full Name:</label>
              <input type="text" id="fname" placeholder="enter your full name" required class="form-control py-4">
            </div>

            <div class="form-group mb-3">
              <label for="contact" class="fw-bold fs-4">Contact No:</label>
              <input type="text" id="contact" placeholder="enter your phone number" required class="form-control py-4">
            </div>
            <div class="form-group mb-3">
              <label for="mail" class="fw-bold fs-4">Email:</label>
              <input type="email" id="mail" placeholder="enter your phone number" required class="form-control py-4">
            </div>

            <div class="form-group mb-3">
              <label for="contact" class="fw-bold fs-4">Password:</label>
              <input type="text" id="contact" placeholder="enter your phone number" required class="form-control py-4">
            </div>


            <div>
              <input type="submit" value="Login" class="btn btn-success rounded-3 w-100 py-3 fs-3">
            </div>

          </form>
        </div>
        <div class="col-md-4">
          <img src="./assets/Images/form-img.webp" alt="Form-img" width="100%" height="100%" loading="lazy">
        </div>
      </div>
    </div>
    </div>
    </div>
